<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>안전보호부의 편지</title>
</head>

<body>
	<div style="text-align:center;">
		<fieldset>
			<legend>안전보호부의 편지</legend>

			<div>
				<button type="button"
				style="float: right;"
				onclick="self.close()"
				>집어넣기</button>
				
			</div>

			<h3>
				안녕하십니까. <br><br>
				보내주신 신청서를 토대로 국가에서 추첨을 진행한 결과, <br>
				국가에서는 당신을 채용하기로 결정했습니다. <br><br>
				이에 따라, 관련 정책에 따라서 국가 소속의 회사에 배치하여 <br>
				국가와 밀접한 업무를 담당하게 할 것입니다. <br> <br>
				그리고 당신에게 <b>신입 사원</b> 직책을 부여하고, <br>
				회사 근처에 있는 <b>임대 아파트</b>를 제공할 것입니다. <br><br>
				내일부터 편지에 표시된 회사로 출근하시기 바랍니다. <br>
				자세한 업무 사항은 <b>안내소에 있는 안내인</b> 이 자세히 설명해 줄 것입니다. <br><br>
				그럼, 행운을 빌겠습니다. <br><br>
				유토피아에 영광을 <br><br>
			</h3>
			<img src="../../images/유토피아.png" width="100" height="100" alt="Utopia">
		</fieldset>
	</div>	
</body>
</html>
