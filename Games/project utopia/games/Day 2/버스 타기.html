	<body>
		당신은 버스 정류장으로 발걸음을 옮겼습니다.<br>
		버스 정류장에 도착하자 마침 버스가 도착했습니다.<br>
		버스에 올라타자 퇴근 시간답게 버스가 사람들로 가득 찼습니다.<br>
		미어질 듯 꽉 찬 버스 안에서 당신은 겨우 빈 자리를 찾아 앉았습니다.<br>
		조금 지나자 하차 지점에 도착했고, 뒷문이 덜컹거리며 열렸습니다.<br>
		하차 지점에서 내린 당신은 곧바로 집으로 들어갔습니다.<br>
		당신은 침대에 눕자마자 잠들었습니다.<br><br>
