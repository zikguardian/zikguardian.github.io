	<body>
		당신은 편의점 냉장고에서 생수를 구매했습니다.<br>
		생수에는 국가의 인장이 표시되어 있습니다.<br>
		국가 기업에서 제작한 생수임이 틀림없습니다.<br>
		생수를 마시자 시원한 물이 목으로 흘러들어 왔습니다.<br>
		당신은 빈 생수병을 버리고 곧장 집으로 왔습니다.<br>
		하루 내내 피곤했던 당신은 침대에 눕자마자 잠에 들었습니다.<br><br>
