		<h2>집으로 바로 가기</h2>
	</head>
	
	<body>
		당신은 편의점에 들리지 않고 바로 집으로 향했습니다.<br>
		멀리서 지는 태양에 바라보면서 당신은 걸음을 옮겼습니다.<br>
		집에 도착하니 거의 어두워졌습니다.<br>
		왠지 모를 피로에 휩싸인 당신은 침대에 누웠습니다.<br>
		침대에 누운 당신은 곤히 잠들었습니다.<br><br>
