	<body>
		당신은 퇴근을 위해 한적한 길거리를 걸었습니다.<br>
		하늘에는 태양이 내리쬐고있지만, 산들바람이 불어와서 조금 시원합니다.<br>
		퇴근길에는 알 수 없는 문양이 그려져 있는 전단지가 떨어져 있습니다.<br>
		그러나 전단지는 이내 바람에 날려 멀리 사라졌습니다.<br>
		당신은 다시 퇴근길을 걸어서 집으로 향했습니다.<br>
		집에 도착한 당신은 편히 쉬었습니다.<br><br>
