<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <link rel="shortcut icon" type="image/x-icon" href="../asset/image/logo.png">

  <title> 글쓰기 | DNA Games </title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>

<script>
  function button_event() {

    if (confirm('등록된 게시글은 삭제하기 어렵습니다. 이대로 등록하시겠습니까?') == true) {
      location.href = '../index.html'
      alert("게시글을 올렸습니다.")


    } else {
      alert('행동하기 전에 심사숙고 하시는 편이로군요. 현명하십니다.')
    }
  }
</script>

<script>
  function button_event() {

    if (confirm('등록된 게시글은 삭제하기 어렵습니다. 이대로 등록하시겠습니까?') == true) {
      location.href = '../index.html'
      alert("게시글을 올렸습니다.")


    } else {
      alert('행동하기 전에 심사숙고 하시는 편이로군요. 현명하십니다.')
    }
  }
</script>

<script>
  function exit_event() {

    if (confirm('나가게 되면 작성 중인 글은 삭제 됩니다. 그래도 나가시겠습니까?') == true) {
      location.href = '../index.html'

    } else {
      alert('행동하기 전에 심사숙고 하시는 편이로군요. 현명하십니다.')
    }
  }
</script>


<body>
  <div class="container">
    <div style="text-align:right">
      <button type="button" onclick="exit_event();">나가기</button>
    </div>
    <h2>게시판 글쓰기</h2>
    <form action="write.jsp" method="post">
      <div class="form-group">
        <label for="title">제목</label>
        <!-- placeholder 속성 입력한 데이터가 없는 경우 배경으로 나타난다.실제적으로 입력을 100자까지로 지정 -->
        <!-- required 속성을 설정하면 필수입력 사항이된다. -->
        <!-- pattern 속성을 이용한 정규표현식으로 데이터의 유효성 검사를 할 수 있다. -->
        <input type="text" class="form-control" id="title" placeholder="제목 입력(4-100)" name="title" maxlength="100"
          required="required" pattern=".{4,100}">
      </div>
      <div class="form-group">
        <label for="content">내용</label>
        <!--  여러줄의 데이터를 입력하고 하고자 할때 textarea 태그를 사용한다. -->
        <!--  textarea 안에 있는 모든 글자는 그대로 나타난다. 공백문자, tag, enter -->
        <textarea class="form-control" rows="5" id="content" name="content" placeholder="내용 작성"></textarea>
      </div>
      <div class="form-group">
        <label for="writer">작성자</label>
        <input type="text" class="form-control" id="writer" placeholder="작성자(2자-10자)" name="writer">
      </div>
      <button type="button" class="btn btn-default" onclick="button_event()">등록</button>
    </form>
  </div>
</body>

</html>
